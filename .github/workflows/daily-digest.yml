name: Agentic AI Daily Digest

on:
  schedule:
    # Fire every 30 min across the whole active span (02:00–18:30 UTC ==
    # 07:30 IST–00:00 IST) so even a badly delayed GitHub run still lands a
    # trigger while a slot is eligible. The send-once-per-slot guard makes only
    # the first eligible trigger per slot actually email; every other fire exits
    # immediately (no model call, no email). GitHub's cron is chronically late,
    # so wide coverage + the until-next-slot eligibility = no more misses.
    - cron: "*/30 2-18 * * *"
  workflow_dispatch:
    # Manual trigger from the Actions tab.
    inputs:
      dry_run:
        description: "Generate & commit but do NOT send email"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Always check out the live branch tip so a queued run sees the slot
          # state just committed by the run ahead of it (prevents double-send).
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and send digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          OPEN_ROUTER_API_KEY: ${{ secrets.OPEN_ROUTER_API_KEY }}
          # If these two are set, the agent sends via your own Gmail (free, reaches
          # any recipient incl. @kore.com). If unset, it falls back to Resend.
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_DRY_RUN: ${{ github.event.inputs.dry_run }}
          # Marks scheduled runs so the send-once-per-slot guard applies. Manual
          # workflow_dispatch leaves this empty and always sends on demand.
          DIGEST_SCHEDULED: ${{ github.event_name == 'schedule' && '1' || '' }}
        run: python digest_agent.py

      - name: Commit the digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/ schedule_state.json
          if git diff --staged --quiet; then
            echo "No new digest to commit."
          else
            git commit -m "digest: $(date -u +%Y-%m-%dT%H%MZ)"
            git pull --rebase --autostash origin main || true
            git push origin HEAD:main
          fi
