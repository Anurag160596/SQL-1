name: Undercut Rapid Alerts

on:
  schedule:
    # Every 4 hours. Short-window sweep; emails ONLY when a high-value
    # competitor trigger is genuinely breaking (else it sends nothing).
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Generate but do NOT send email"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: undercut-alerts
  cancel-in-progress: false

jobs:
  alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run rapid alert sweep
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          OPEN_ROUTER_API_KEY: ${{ secrets.OPEN_ROUTER_API_KEY }}
          DIGEST_MODE: alerts
          DIGEST_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: python digest_agent.py

      - name: Commit alert dedup state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add alerts_state.json
          if git diff --staged --quiet; then
            echo "No alert-state change to commit."
          else
            git commit -m "alerts: update dedup state"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push
          fi
