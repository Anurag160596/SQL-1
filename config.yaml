# ============================================================
# Agentic AI Daily Digest — configuration
# Edit this file to tune what the agent tracks and where it sends.
# No code changes needed.
# ============================================================

# Who receives the digest. Add more addresses to fan it out.
recipients:
  - anuragblr19@gmail.com

# One-off pause: while this UTC timestamp is in the future, ALL runs (digest +
# alerts) skip entirely — no email. Self-clears once the time passes. Set to ""
# to disable. Currently set to keep things quiet overnight; the first run after
# this is the 08:00 IST / 02:30 UTC digest tomorrow, which sends normally.
pause_until: "2026-06-24T02:00:00Z"

email:
  # Without a verified domain, Resend only sends from onboarding@resend.dev
  # (and only to the address you signed up to Resend with).
  from: "Agentic AI Digest <onboarding@resend.dev>"
  subject_prefix: "🤖 Agentic AI Daily —"

model:
  # Gemini model with Google Search grounding. Override via GEMINI_MODEL env var.
  # IMPORTANT: gemini-2.5-flash actually performs grounded web search and returns
  # fresh, dated news. gemini-2.5-flash-lite often skips search and recycles the
  # knowledge base, so it's only a last-resort fallback. gemini-2.5-pro (paid) is
  # deeper still. Enabling billing removes free-tier 503s entirely.
  name: gemini-2.5-flash
  # If the primary is overloaded (503) or over quota (429), the agent retries
  # (see max_retries below) then falls back through these in order.
  fallbacks:
    - gemini-2.5-flash-lite
  temperature: 0.4
  # Per-model retry with exponential backoff before falling to the next model.
  # Waits backoff_base * 2^(n-1) between attempts (e.g. 5s, 10s, 20s).
  # Makes unattended cron runs resilient to transient free-tier 503s.
  max_retries: 4
  retry_backoff_seconds: 5

# Fallback brain: if Gemini is exhausted (free-tier 503/429 across all retries),
# the agent synthesizes the digest via OpenRouter instead (separate capacity).
# Needs the OPEN_ROUTER_API_KEY secret. Models are tried in order; edit freely.
# Note: OpenRouter has no Google Search grounding, so it's used for synthesis of
# the pre-fetched RSS news (the primary daily path) — not the search fallback.
openrouter:
  # Ordered by preference. Stronger models first for analysis depth; cheaper ones
  # as backups. Costs a few cents/run on the top models — adjust to taste.
  models:
    - "anthropic/claude-3.5-sonnet"
    - "meta-llama/llama-3.3-70b-instruct"
    - "openai/gpt-4o-mini"

# Fresh-news sourcing via Google News RSS (free, no API key). The agent fetches
# dated, in-window items per competitor and feeds them to the model to synthesize,
# instead of relying on the model to search (which the free tier throttles).
news:
  enabled: true
  max_per_company: 5
  max_total: 40

# ------------------------------------------------------------
# Accuracy governance layer — vets every fetched news item BEFORE it can
# enter the digest. Runs between fetch (Google News RSS) and synthesis.
# Two gates: (1) deterministic source-quality + scope filter, (2) a model
# review that confirms each item is genuinely ABOUT the named competitor and
# on-topic, dropping misattributions, look-alikes, and SEO/finance filler.
# This is what prevents e.g. an "Anthropic/Claude hack" story being filed
# under "Sierra", or an "eGain/Zoom" story being filed under "Genesys".
# ------------------------------------------------------------
verification:
  enabled: true
  # Best-effort fetch the article text so the reviewer judges on real content,
  # not just the headline. Falls back to headline-only if a fetch fails.
  fetch_articles: true
  fetch_timeout_seconds: 6
  # When the reviewer is uncertain, drop the item (favor precision over recall).
  drop_when_uncertain: true
  # Output-grounding pass: after the digest is written, rewrite it so every dated
  # "What happened" claim and every table row is backed by a verified item — deleting
  # anything the model invented from background knowledge (e.g. recycling a past
  # "outage" or "lacks analyst validation" as today's news). Best-effort; on failure
  # the digest passes through unchanged (the input gates already ran).
  audit_output: true

sources:
  # PRIMARY gate: block by publication NAME (the RSS <source>), matched as a
  # case-insensitive substring. This is what actually works, because Google News
  # RSS links are news.google.com redirect URLs (so domain matching alone can't
  # see the real publisher). These are financial-data aggregators, SEO/press-spam,
  # and re-syndicators that routinely mis-tag company names. Primary outlets,
  # company newsrooms, and the major wires (Reuters, Bloomberg, Business Wire,
  # PR Newswire, TechCrunch, VentureBeat, ZDNet, CX Today, No Jitter…) are kept.
  blocked_sources:
    - tipranks
    - stocktitan
    - stock titan
    - gurufocus
    - simply wall
    - simplywall
    - insider monkey
    - insidermonkey
    - pluang
    - briefglance
    - brief glance
    - kavout
    - benzinga
    - marketbeat
    - motley fool
    - investing.com
    - yahoo finance
    - "msn"
    - mirror-democrat
    - mirror democrat
    - newswiretoday
  # Secondary gate: block by domain too, for the rare item that arrives with a
  # real publisher URL instead of a Google redirect.
  blocked_domains:
    - tipranks.com
    - stocktitan.io
    - stocktitan.net
    - gurufocus.com
    - simplywall.st
    - insidermonkey.com
    - pluang.com
    - briefglance.com
    - kavout.com
    - aol.com
    - benzinga.com
    - marketbeat.com
    - fool.com
    - investing.com
    - finance.yahoo.com
    - sg.finance.yahoo.com
    - ca.finance.yahoo.com
    - msn.com

# Honesty guard: how to handle a run where the model performed NO live web
# search (zero grounding sources) — which on the free tier means it likely
# recycled the knowledge base instead of finding fresh news.
grounding:
  # Daily digest: prepend a clear "KB-only / unverified" warning banner.
  # (Always on; the banner makes stale content obvious instead of misleading.)
  # If true, the daily digest is archived but NOT emailed when ungrounded.
  skip_if_ungrounded: false
  # Rapid alerts are ALWAYS suppressed when ungrounded (an alert with no live
  # search can't be trusted) — not configurable.

# How far back to look for "news" each run. Genuinely new competitor news is
# sparse day-to-day in this market, so 72h gives enough fresh material while
# staying recent. Every item is still date-stamped so nothing stale slips in.
lookback_hours: 72

# ------------------------------------------------------------
# Undercut engine — the openings the agent hunts for and how it
# frames competitor news into actionable plays.
# ------------------------------------------------------------
undercut:
  # Weaknesses the agent actively looks for across every competitor.
  levers:
    - "Pricing & TCO: price hikes, consumption-pricing pain, hidden costs, unpredictable total cost of ownership"
    - "Proof & validation gaps: missing/withdrawn analyst recognition (Gartner/Forrester/Everest/IDC), thin customer evidence, weak or negative third-party reviews (G2, Peer Insights, TrustRadius)"
    - "Channel & coverage gaps: voice-only or voice-first limits vs. true omnichannel, narrow geographic reach, narrow product scope"
    - "Reliability, governance, security & compliance: outages, incidents, breaches, lack of determinism/auditability, compliance failures"
    - "Any other exploitable opening: exec departures, layoffs, financial distress, lost/churned marquee customers, delayed or underwhelming launches, negative press, partnership breakups"

  # High-value, time-sensitive events that justify an IMMEDIATE alert email
  # (used by the rapid-alert run mode, not the daily digest).
  alert_triggers:
    - "Pricing change or major repackaging"
    - "Outage, security incident, or data breach"
    - "Executive departure or leadership shakeup"
    - "Lost, churned, or publicly unhappy marquee customer"
    - "Analyst downgrade, exclusion, or critical report"
    - "Layoffs, down-round, or financial distress"
    - "Major acquisition, merger, or partnership (or its collapse)"

# Rapid-alert mode (DIGEST_MODE=alerts): short-window sweep that emails ONLY
# when a high-value trigger above is genuinely breaking.
alerts:
  lookback_hours: 6
  subject_prefix: "🚨 Undercut Alert —"

# Timezone used to date the digest and the morning run.
timezone: "Asia/Kolkata"

# ------------------------------------------------------------
# Broad topic areas the agent sweeps every day.
# ------------------------------------------------------------
topics:
  - "Enterprise conversational AI & contact-center AI (CCAI): AI agents/virtual agents, voice AI, agent-assist, and CX automation platforms — product launches, customer wins, pricing moves"
  - "Agentic AI platforms for the enterprise (Salesforce Agentforce, ServiceNow, Microsoft Copilot/Copilot Studio, Google CCAI, AWS, IBM watsonx Orchestrate) — releases and positioning"
  - "Foundation-model & lab releases relevant to enterprise agents (OpenAI, Anthropic, Google DeepMind, Meta, Mistral) — tool use, voice, long-horizon reasoning, and what they mean for CX agents"
  - "Analyst moves that matter in this market (Gartner MQ, Forrester Wave, Everest, IDC, Opus Research) — new reports, leader placements, rankings"
  - "Funding rounds, M&A, earnings, partnerships, and enterprise adoption across customer-service / CX / agentic AI vendors"

# ------------------------------------------------------------
# Competitor / company watchlist — the agent PRIORITIZES news
# about these and gives them a dedicated section.
#
# 'focus' tells the agent what to emphasize for that company.
# Use "anything notable" for general tracking.
#
# >>> REPLACE THE STARTER LIST BELOW WITH YOUR REAL WATCHLIST <<<
# ===== ADD YOURS HERE =====
# ------------------------------------------------------------
